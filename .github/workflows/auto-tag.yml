name: Auto-tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Falls back to GITHUB_TOKEN if RELEASE_PAT isn't set so the
          # workflow can still run (and skip) on repos without the secret.
          # The push step refuses to tag when RELEASE_PAT is absent, because
          # tags pushed under GITHUB_TOKEN do not trigger downstream workflows.
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Extract version from Changes.md
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -om1 '^## .* (v.*)$' Applications/TextMate/about/Changes.md \
                    | sed 's/.*(v\(.*\))/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::No version line found in Applications/TextMate/about/Changes.md"
            exit 1
          fi
          echo "Detected: v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push tag if new
        env:
          VERSION: ${{ steps.version.outputs.version }}
          HAVE_PAT: ${{ secrets.RELEASE_PAT != '' }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # Only release versions carrying the -undead suffix.
          # Upstream (textmate/textmate) versions never get auto-tagged.
          case "${VERSION}" in
            *-undead*) ;;
            *) echo "Top version '${VERSION}' is not an undead release; skipping"; exit 0 ;;
          esac
          if [ "${HAVE_PAT}" != "true" ]; then
            echo "::error::RELEASE_PAT secret is not set; refusing to tag because a GITHUB_TOKEN push would not trigger release.yml"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
