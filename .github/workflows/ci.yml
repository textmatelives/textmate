name: CI

on:
  push:
    branches: [textmate_lives]
  pull_request:
    branches: [textmate_lives]

jobs:
  build-test:
    runs-on: macos-14   # Apple Silicon
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install boost capnp google-sparsehash multimarkdown ninja ragel

      - name: Pre-seed local.rave for arm64 Homebrew prefix
        run: |
          cat > local.rave <<'EOF'
          add FLAGS    "-I/opt/homebrew/include"
          add LN_FLAGS "-L/opt/homebrew/lib"
          EOF

      - name: Configure
        run: ./configure

      - name: Build TextMate.app
        run: ninja TextMate

      - name: Discover and run all framework tests
        run: |
          # Excluded:
          #   buffer  - 3 spellcheck tests need NSSpellChecker dictionary (no headless support)
          #   cf      - t_rect.cc segfaults under parallel test runner on macos-14
          TESTS=$(grep -lE '^[[:space:]]*tests[[:space:]]' Frameworks/*/default.rave \
                  | xargs -n1 dirname | xargs -n1 basename \
                  | grep -vE '^(buffer|cf)$' \
                  | sed 's|$|/test|')
          echo "Running tests: $TESTS"
          ninja $TESTS
